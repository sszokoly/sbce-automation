- name: "Create 'args' from the 'sheet'"
  ansible.builtin.set_fact:
    args: >-
      {{ (ansible_facts['sbce_config']
          | select('contains', sheet)
          | first)[sheet] }}

- name: Wait 180 seconds for initialization to complete
  ansible.builtin.pause:
    seconds: 180

- name: Send "1" to configure command line mode
  community.vmware.vmware_guest_sendkey: &sendkey_base
    hostname: "{{ args.platform_address }}"
    username: "{{ args.platform_username }}"
    password: "{{ args.platform_password }}"
    name: "{{ args.vmname }}"
    validate_certs: false
    string_send: "1"

- name: Send ENTER
  community.vmware.vmware_guest_sendkey:
    <<: *sendkey_base
    keys_send:
      - ENTER
    sleep_time: 10
  no_log: true
  changed_when: false

- name: Send ipmode
  community.vmware.vmware_guest_sendkey:
    <<: *sendkey_base
    string_send: "{{ args.ipmode }}"
  when: args.ipmode is defined and (args.ipmode | string | length) > 0

- name: Send ipmode ENTER
  community.vmware.vmware_guest_sendkey:
    <<: *sendkey_base
    keys_send:
      - ENTER
    sleep_time: 3
  no_log: true
  changed_when: false

