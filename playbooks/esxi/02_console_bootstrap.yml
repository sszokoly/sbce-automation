- name: "Create 'args' from the 'sheet'"
  ansible.builtin.set_fact:
    args: >-
      {{ (ansible_facts['sbce_config']
          | select('contains', sheet)
          | first)[sheet] }}

- name: "Set up 'sendkey_base' macro"
  community.vmware.vmware_guest_sendkey: &sendkey_base
    hostname: "{{ args.platform_address }}"
    username: "{{ args.platform_username }}"
    password: "{{ args.platform_password }}"
    name: "{{ args.vmname }}"
    validate_certs: false

- name: "Enter your choice [1 - 4] : 1"
  community.vmware.vmware_guest_sendkey:
    <<: *sendkey_base
    string_send: "1"

- name: Send ENTER
  community.vmware.vmware_guest_sendkey:
    <<: *sendkey_base
    keys_send:
      - ENTER
    sleep_time: 10
  no_log: true
  changed_when: false

- name: "IP Mode: {{ args.ipmode }}"
  community.vmware.vmware_guest_sendkey:
    <<: *sendkey_base
    string_send: "{{ args.ipmode }}"
  when: args.ipmode is defined and (args.ipmode | string | length) > 0

- name: Send ipmode ENTER
  community.vmware.vmware_guest_sendkey:
    <<: *sendkey_base
    keys_send:
      - ENTER
    sleep_time: "{{ sleep_time }}"
  no_log: true
  changed_when: false

- name: "Appliance Type: {{ args.apptype }}"
  community.vmware.vmware_guest_sendkey:
    <<: *sendkey_base
    string_send: "{{ args.apptype }}"
  when: args.apptype is defined and (args.apptype | string | length) > 0

- name: Send apptype ENTER
  community.vmware.vmware_guest_sendkey:
    <<: *sendkey_base
    keys_send:
      - ENTER
    sleep_time: "{{ sleep_time }}"
  no_log: true
  changed_when: false

