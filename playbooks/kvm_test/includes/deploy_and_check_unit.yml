---
- name: "Check SBCE unit installable attempt {{ installable_attempt }}"
  when: not sbce_unit_installable | bool
  block:
    - name: "Poll EMS until SBCE unit is installable"
      vars:
        primary_child: "{{ sbce_unit.nodes[0] }}"
        secondary_child: "{{ sbce_unit.nodes[1] if sbce_unit.type == 'ha' else {} }}"
      ansible.builtin.command:
        argv:
          - "{{ ansible_playbook_python }}"
          - "{{ playbook_dir }}/scripts/webui_query.py"
          - --host
          - "{{ ems_node.ip0 }}"
          - --ucsec-password
          - "{{ ems_node.ucsecpass }}"
          - --check-installable
          - --name
          - "{{ primary_child.vmname }}"
          - --ip
          - "{{ primary_child.ip0 }}"
          - --name2
          - "{{ secondary_child.vmname | default('') }}"
          - --ip2
          - "{{ secondary_child.ip0 | default('') }}"
      register: installable_query
      changed_when: false
      failed_when: false
      until: (installable_query.stdout | default('{}') | from_json).data.installable | default(false)
      retries: "{{ ((sbce_installable_timeout | int) / (sbce_installable_poll_interval | int)) | round(0, 'ceil') | int }}"
      delay: "{{ sbce_installable_poll_interval | int }}"
      delegate_to: localhost

    - name: "Record installable query result"
      ansible.builtin.set_fact:
        sbce_unit_installable: "{{ (installable_query.stdout | default('{}') | from_json).data.installable | default(false) }}"
        sbce_unit_last_error: "{{ (installable_query.stdout | default('{}') | from_json).data.raw_status | default('not installable') }}"

  rescue:
    - name: "Record SBCE installable check failure"
      ansible.builtin.set_fact:
        sbce_unit_installable: false
        sbce_unit_last_error: "{{ ansible_failed_task.name | default('unknown task') }}: {{ ansible_failed_result.msg | default(ansible_failed_result.stderr | default('failed')) }}"
