---
- name: "Console bootstrap notice"
  ansible.builtin.debug:
    msg: >-
      Running KVM test console bootstrap for {{ node.hostname | default(node.vmname) }}.
      console_prompt_check={{ console_prompt_check }}; auto mode may fall back to fixed waits.

- name: "Run existing KVM console bootstrap sequence"
  ansible.builtin.include_tasks:
    file: ../../kvm/includes/02a_console_bootstrap.yml
  vars:
    args: "{{ node }}"
