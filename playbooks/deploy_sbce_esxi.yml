---
- hosts: localhost
  gather_facts: false

  tasks:
    - name: "Fail if 'sbce_config' file argument is not in --extra-vars"
      ansible.builtin.fail:
        msg: "'sbce_config' file argument is not in --extra-vars"
      when: sbce_config is not defined

    - name: Run PLAY parse_sbce_config.yml
      include_tasks: parse_sbce_config.yml

    - name: Display args data
      ansible.builtin.debug:
        var: args

    - name: "Deploy {{ args.ovf }}"
      community.vmware.vmware_deploy_ovf:
        hostname: "{{ args.host_address }}"
        username: "{{ args.host_username }}"
        password: "{{ args.host_password }}"
        #datacenter: "ha-datacenter"
        datastore: "{{ args.datastore }}"
        name: "{{ args.vmname }}"
        ovf: "{{ args.ovf }}"
        networks:
          "A1": "{{ args.A1 }}"
          "A2": "{{ args.A2 }}"
          "B1": "{{ args.B1 }}"
          "B2": "{{ args.B2 }}"
          "M1": "{{ args.M1 }}"
          "M2": "{{ args.M2 }}"
        power_on: false
        wait_for_ip_address: false
        validate_certs: false
      delegate_to: localhost
...