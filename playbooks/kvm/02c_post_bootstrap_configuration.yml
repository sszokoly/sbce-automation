- name: Add SBCE to in-memory inventory
  ansible.builtin.add_host:
    hostname: "{{ args.hostname | default(args.vmname) }}"
    ansible_host: "{{ args.ip0 }}"
    ansible_user: ipcs
    ansible_password: "{{ args.ipcspass }}"
    ansible_become_user: root
    ansible_become_password: "{{ args.rootpass }}"
    ansible_become_method: su
    ansible_port: 22
  no_log: true
  tags:
    - step02
    - step02c
    - step02c1

- name: Wait 4 mins for the initialization to complete
  ansible.builtin.pause:
    seconds: 240
  tags:
    - step02
    - step02c
    - step02c2

- name: "Ansible ping to {{ args.hostname }}"
  ansible.builtin.ping:
  delegate_to: "{{ args.hostname | default(args.vmname) }}"
  tags:
    - step02
    - step02c
    - step02c3

- name: "Update timezone"
  become: yes
  ansible.builtin.shell: "timedatectl set-timezone {{ args.timezone }}"
  when: args.timezone| default('', true) | length > 0
  delegate_to: "{{ args.hostname | default(args.vmname) }}"
  tags:
    - step02
    - step02c
    - step02c4

- name: "Extract 1st NTP server"
  ansible.builtin.set_fact:
    ntpserver: "{{ (args.ntpservers | default('', true)).split(',') | first }}"
  when: args.ntpservers | default('', true) | length > 0
  delegate_to: "{{ args.hostname | default(args.vmname) }}"
  tags:
    - step02
    - step02c
    - step02c5

- name: "Update NTP server"
  become: yes
  ansible.builtin.shell: "sbceconfigurator.py change-ntp-ip {{ ntpserver }}"
  when: ntpserver is defined and ntpserver | length > 0
  delegate_to: "{{ args.hostname | default(args.vmname) }}"
  tags:
    - step02
    - step02c
    - step02c6

- name: "Disable password aging for 'ipcs' user"
  become: yes
  ansible.builtin.shell: "chage -E -1 -m 0 -M 99999 ipcs"
  delegate_to: "{{ args.hostname | default(args.vmname) }}"
  tags:
    - step02
    - step02c
    - step02c7
