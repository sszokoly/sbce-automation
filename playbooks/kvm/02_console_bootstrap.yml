- name: "Create 'args' from the 'sheet'"
  ansible.builtin.set_fact:
    args: >-
      {{ (ansible_facts['sbce_config']
          | select('contains', sheet)
          | first)[sheet] }}

- name: "Enter your choice [1 - 4] : 1"
  kvm_guest_sendkey:
    name: "{{ args['vmname'] }}"
    string_send: "1"
    no_enter: true

- name: Send ENTER
  kvm_guest_sendkey:
    name: "{{ args['vmname'] }}"
    keys_send:
      - ENTER
    sleep_time: 10
  no_log: true
  changed_when: false

