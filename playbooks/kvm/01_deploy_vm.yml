- name: "Create 'args' from the 'sheet'"
  ansible.builtin.set_fact:
    args: >-
      {{ (ansible_facts['sbce_config']
          | select('contains', sheet)
          | first)[sheet] }}

- name: Extract basename from SBCE image filename
  ansible.builtin.set_fact:
    filename: "{{ args['ovf'] | basename }}"
  when: args['ovf'] | default('', true) | length > 0

- name: Create image_file_name from filename
  vars:
    stem: "{{ (filename | default('', true)).rsplit('.', 1) | first }}"
    type: "{{ 'SBCE' if args['apptype'] == 'SBCE' else 'EMS' }}"
  ansible.builtin.set_fact:
    image_filename: "{{ stem }}-{{ type }}-{{ args['vmname'] }}-thick.qcow2"

- name: Add KVM platform to ansible
  ansible.builtin.add_host:
    hostname: "kvm_host"
    ansible_host: "{{ args['platform_address'] }}"
    ansible_user: "{{ args['platform_username'] }}"
    ansible_password: "{{ args['platform_password'] }}"
    ansible_become: true
    ansible_become_method: sudo
    ansible_become_password: "{{ args['platform_password'] }}"
    ansible_port: 22

- name: Create /var/lib/libvirt/staging folder if it does not exist
  ansible.builtin.file:
    path: /var/lib/libvirt/staging
    state: directory
    mode: '0755'
    owner: "{{ args['platform_username'] }}"
    group: "{{ args['platform_username'] }}"
  become: yes
  delegate_to: kvm_host

- name: Set ansible_remote_tmp after staging folder exists
  ansible.builtin.add_host:
    hostname: "kvm_host"
    ansible_remote_tmp: "/var/lib/libvirt/staging/"

