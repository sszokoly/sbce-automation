# - name: Debug args
#   ansible.builtin.debug:
#     var: args

- name: Wait for the Web UI to become available
  ansible.builtin.uri:
    url: "https://{{ args.ip0 }}/sbc/"
    method: GET
    validate_certs: false
    return_content: false
    timeout: 5
  register: webui_probe
  failed_when: false
  until: webui_probe.status | default(0) == 200
  retries: 30
  delay: 10
  delegate_to: localhost
  tags:
    - step02
    - step02c
    - step02c1

- name: "Accept EULA"
  sbce_web_bootstrap:
    argv:
      - --eula
      - --host
      - "{{ args.ip0 }}"
      - --debug
  delegate_to: localhost
  tags:
    - step02
    - step02c
    - step02c2

- name: "Change Web UI password"
  sbce_web_bootstrap:
    argv:
      - --change-password
      - --host
      - "{{ args.ip0 }}"
      - --ucsec-password
      - "{{ args.ucsecpass }}"
      - --debug
  delegate_to: localhost
  no_log: false
  tags:
    - step02
    - step02c
    - step02c3

- name: "Add SBCE and Secondary EMS nodes to Primary EMS"
  vars:
    flat_config: "{{ ansible_facts['sbce_config'] | combine }}"
    primary_node: "{{ flat_config[item[0]] }}"
    secondary_node: "{{ flat_config[item[1]] if item | length > 1 else {} }}"
    node_type: "{{ 'ems' if primary_node.apptype == 'EMS' else ('ha' if item | length > 1 else 'sbce') }}"
    add_node_argv: >-
      {{
        [
          '--add-node',
          '--host', args.ip0,
          '--ucsec-password', args.ucsecpass,
          '--type', node_type,
          '--name', primary_node.vmname,
          '--ip', primary_node.ip0,
          '--debug'
        ]
        +
        ([
          '--name2', secondary_node.vmname,
          '--ip2', secondary_node.ip0
        ] if node_type == 'ha' else [])
      }}
  sbce_web_bootstrap:
    argv: "{{ add_node_argv }}"
  loop: "{{ ems_nodes[sheet] | default([]) }}"
  delegate_to: localhost
  no_log: false
  tags:
    - step02
    - step02c
    - step02c4
