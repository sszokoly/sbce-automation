- name: Add SBCE to in-memory inventory
  ansible.builtin.add_host:
    hostname: "{{ args.hostname | default(args.vmname) }}"
    ansible_host: "{{ args.ip0 }}"
    ansible_user: ipcs
    ansible_password: "{{ args.ipcspass }}"
    ansible_become_user: root
    ansible_become_password: "{{ args.rootpass }}"
    ansible_become_method: su
    ansible_port: 22
  no_log: true
  tags:
    - step02
    - step02b
    - step02b1

- name: "Wait for {{ args.hostname | default(args.vmname) }} SSH to become available"
  ansible.builtin.wait_for_connection:
    delay: 30
    timeout: 600
  delegate_to: "{{ args.hostname | default(args.vmname) }}"
  tags:
    - step02
    - step02b
    - step02b2
    - step02b3

- name: "Update timezone"
  become: yes
  ansible.builtin.shell: "timedatectl set-timezone {{ args.timezone }}"
  when: args.timezone| default('', true) | length > 0
  delegate_to: "{{ args.hostname | default(args.vmname) }}"
  tags:
    - step02
    - step02b
    - step02b4

- name: "Extract 1st NTP server"
  ansible.builtin.set_fact:
    ntpserver: "{{ (args.ntpservers | default('', true)).split(',') | first }}"
  when: args.ntpservers | default('', true) | length > 0
  delegate_to: "{{ args.hostname | default(args.vmname) }}"
  tags:
    - step02
    - step02b
    - step02b5

- name: "Update NTP server"
  become: yes
  ansible.builtin.shell: "sbceconfigurator.py change-ntp-ip {{ ntpserver }}"
  when: ntpserver is defined and ntpserver | length > 0
  delegate_to: "{{ args.hostname | default(args.vmname) }}"
  tags:
    - step02
    - step02b
    - step02b6

- name: "Disable password aging for 'ipcs' user"
  become: yes
  ansible.builtin.shell: "chage -E -1 -m 0 -M 99999 ipcs"
  delegate_to: "{{ args.hostname | default(args.vmname) }}"
  tags:
    - step02
    - step02b
    - step02b7

- name: "Authorize Secure Boot certificate"
  when: args.apptype == "SBCE" or args.apptype == "EMS+SBCE"
  block:
    - name: "Import certificate"
      become: yes
      ansible.builtin.command:
        argv:
          - mokutil
          - --import
          - asbc_custom_secure_boot_cert.cer
      args:
        chdir: /usr/local/ipcs/etc/cert/signatures/
        stdin: |
          {{ args.rootpass }}
          {{ args.rootpass }}
      no_log: true
      delegate_to: "{{ args.hostname | default(args.vmname) }}"
      tags:
        - step02
        - step02b
        - step02b8

    - name: "Reboot SBCE"
      ansible.builtin.command: /sbin/reboot
      become: yes
      delegate_to: "{{ args.hostname | default(args.vmname) }}"
      async: 1
      poll: 0
      failed_when: false
      tags:
        - step02
        - step02b
        - step02b9

    - name: "Wait 8 secs for the blue MOK screen to show up"
      ansible.builtin.pause:
        seconds: 8
      tags:
        - step02
        - step02b
        - step02b10

    - name: Send ENTER
      kvm_guest_sendkey:
        name: "{{ args['vmname'] }}"
        keys_send:
          - ENTER
        sleep_time: "{{ sleep_time }}"
      changed_when: false
      tags:
        - step02
        - step02b
        - step02b11

    - name: Send DOWN key to select 'Enroll MOK'
      kvm_guest_sendkey:
        name: "{{ args['vmname'] }}"
        keys_send:
          - DOWN
        sleep_time: "{{ sleep_time }}"
      changed_when: false
      tags:
        - step02
        - step02b
        - step02b12

    - name: Send ENTER
      kvm_guest_sendkey:
        name: "{{ args['vmname'] }}"
        keys_send:
          - ENTER
        sleep_time: "{{ sleep_time }}"
      changed_when: false
      tags:
        - step02
        - step02b
        - step02b13

    - name: Send DOWN key to select 'Continue'
      kvm_guest_sendkey:
        name: "{{ args['vmname'] }}"
        keys_send:
          - DOWN
        sleep_time: "{{ sleep_time }}"
      changed_when: false
      tags:
        - step02
        - step02b
        - step02b14

    - name: Send ENTER
      kvm_guest_sendkey:
        name: "{{ args['vmname'] }}"
        keys_send:
          - ENTER
        sleep_time: "{{ sleep_time }}"
      changed_when: false
      tags:
        - step02
        - step02b
        - step02b15

    - name: Send DOWN key to select 'Yes'
      kvm_guest_sendkey:
        name: "{{ args['vmname'] }}"
        keys_send:
          - DOWN
        sleep_time: "{{ sleep_time }}"
      changed_when: false
      tags:
        - step02
        - step02b
        - step02b16

    - name: Send ENTER
      kvm_guest_sendkey:
        name: "{{ args['vmname'] }}"
        keys_send:
          - ENTER
        sleep_time: "{{ sleep_time }}"
      changed_when: false
      tags:
        - step02
        - step02b
        - step02b17

    - name: "Enter enrollment password"
      kvm_guest_sendkey:
        name: "{{ args['vmname'] }}"
        string_send: "{{ args.rootpass }}"
        no_enter: true
      tags:
        - step02
        - step02b
        - step02b18

    - name: Send ENTER
      kvm_guest_sendkey:
        name: "{{ args['vmname'] }}"
        keys_send:
          - ENTER
        sleep_time: "{{ sleep_time }}"
      changed_when: false
      tags:
        - step02
        - step02b
        - step02b19

    - name: Send ENTER
      kvm_guest_sendkey:
        name: "{{ args['vmname'] }}"
        keys_send:
          - ENTER
        sleep_time: "{{ sleep_time }}"
      changed_when: false
      tags:
        - step02
        - step02b
        - step02b20

    - name: Wait for SBCE SSH after MOK enrollment reboot
      ansible.builtin.wait_for_connection:
        delay: 10
        timeout: 300
      delegate_to: "{{ args.hostname | default(args.vmname) }}"
      tags:
        - step02
        - step02b
        - step02b21
