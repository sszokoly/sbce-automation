- name: Convert qcow2 image to thick-provisioned, this may take a few minutes
  ansible.builtin.shell:
    cmd: qemu-img convert -f qcow2 -O qcow2 -o preallocation=full {{ filename }} {{ image_filename }}
    chdir: "/var/lib/libvirt/staging/"
  become: yes
  delegate_to: kvm_host
  tags:
    - step01
    - step01b
    - step01b1

- name: "Copy {{ image_filename }} to /var/lib/libvirt/images folder"
  ansible.builtin.command:
    cmd: cp --reflink /var/lib/libvirt/staging/{{ image_filename }} /var/lib/libvirt/images/{{ image_filename }}
    creates: /var/lib/libvirt/images/{{ image_filename }}
  become: yes
  delegate_to: kvm_host
  tags:
    - step01
    - step01b
    - step01b2

- name: "Set ownership and permissions"
  ansible.builtin.file:
    path: /var/lib/libvirt/images/{{ image_filename }}
    owner: qemu
    group: qemu
    mode: '0640'
    state: file
  become: yes
  delegate_to: kvm_host
  tags:
    - step01
    - step01b
    - step01b3

- name: Generate VM XML (do not start)
  ansible.builtin.shell: >
    virt-install
    --connect qemu:///system
    --name "{{ args['vmname'] }}"
    --memory 8192
    --vcpus 3,maxvcpus=3,sockets=3,cores=1,threads=1
    --disk /var/lib/libvirt/images/{{ image_filename }},bus=virtio,cache=directsync,boot.order=1
    --os-variant rhel8.10
    --boot uefi
    --cpu host-model
    --graphics vnc,listen=0.0.0.0
    {% for key in ['M1', 'B1', 'A2', 'B2', 'A1', 'M2'] if args[key] is not none %}
    --network bridge="{{ args[key] }}"
    {% endfor %}
    --import
    --print-xml > /tmp/{{ args['vmname'] }}.xml
  become: yes
  delegate_to: kvm_host
  tags:
    - step01
    - step01b
    - step01b4

- name: Define VM (still powered off)
  ansible.builtin.command: virsh -c qemu:///system define "/tmp/{{ args['vmname'] }}.xml"
  become: yes
  delegate_to: kvm_host
  tags:
    - step01
    - step01b
    - step01b5

- name: Enable autostart
  ansible.builtin.command: virsh -c qemu:///system autostart "{{ args['vmname'] }}"
  become: yes
  delegate_to: kvm_host
  tags:
    - step01
    - step01b
    - step01b6

- name: Power on VM
  ansible.builtin.command: virsh -c qemu:///system start "{{ args['vmname'] }}"
  become: yes
  delegate_to: kvm_host
  tags:
    - step01
    - step01b
    - step01b7

- name: "Verify VM console prompt"
  block:
    - name: Wait 4mins for VM to boot up
      ansible.builtin.pause:
        seconds: 240
      tags:
        - step01
        - step01c
        - step01c1

    - name: Resolve screenshot paths
      vars:
        requested_screenshot_path: "{{ screenshot_path | default('data/screenshots/' ~ args['vmname'] ~ '.png') }}"
        resolved_screenshot_path: >-
          {{ requested_screenshot_path
             if requested_screenshot_path.startswith('/')
             else execution_dir ~ '/' ~ requested_screenshot_path }}
      ansible.builtin.set_fact:
        screenshot_png_path: "{{ resolved_screenshot_path }}"
        screenshot_text_base_path: "{{ resolved_screenshot_path | regex_replace('\\.png$', '') }}"
        screenshot_text_path: "{{ (resolved_screenshot_path | regex_replace('\\.png$', '')) ~ '.txt' }}"
      tags:
        - step01
        - step01c
        - step01c2

    - name: Get VM VNC display
      ansible.builtin.command: virsh -c qemu:///system domdisplay "{{ args['vmname'] }}"
      register: vm_domdisplay
      changed_when: false
      failed_when: false
      become: true
      delegate_to: kvm_host
      tags:
        - step01
        - step01c
        - step01c3

    - name: Resolve VM VNC endpoint
      ansible.builtin.set_fact:
        screenshot_vnc_host: "{{ args['platform_address'] }}"
        screenshot_vnc_display: "{{ vm_domdisplay.stdout | regex_search(':(\\d+)$') | regex_replace('^:', '') | int }}"
      when:
        - vm_domdisplay.rc | default(1) == 0
        - vm_domdisplay.stdout | default('') | regex_search(':(\\d+)$')
      tags:
        - step01
        - step01c
        - step01c4

    - name: Take KVM console screenshot
      kvm_console_screenshot:
        method: vnc
        host: "{{ screenshot_vnc_host }}"
        display: "{{ screenshot_vnc_display }}"
        path: "{{ screenshot_png_path }}"
        timeout: 10
      register: screenshot_capture
      failed_when: false
      delegate_to: localhost
      when:
        - screenshot_vnc_host is defined
        - screenshot_vnc_display is defined
      tags:
        - step01
        - step01c
        - step01c5

    - name: Convert screenshot to text
      ansible.builtin.command: tesseract "{{ screenshot_png_path }}" "{{ screenshot_text_base_path }}"
      register: screenshot_ocr
      failed_when: false
      delegate_to: localhost
      when:
        - screenshot_capture is defined
        - not screenshot_capture.failed | default(false)
      tags:
        - step01
        - step01c
        - step01c6

    - name: Read screenshot text file
      ansible.builtin.slurp:
        src: "{{ screenshot_text_path }}"
      register: screenshot
      failed_when: false
      when:
        - screenshot_ocr is defined
        - screenshot_ocr.rc | default(1) == 0
      tags:
        - step01
        - step01c
        - step01c7

    - name: Fail if screenshot does not contain 'Enter your choice'
      ansible.builtin.fail:
        msg: "VM '{{ args['vmname'] }}' console did not contain the expected 'Enter your choice' prompt."
      when:
        - screenshot is defined
        - not screenshot.failed | default(false)
        - "'Enter your choice' not in (screenshot.content | b64decode)"
      tags:
        - step01
        - step01c
        - step01c8
  tags:
    - step01
    - step01c
