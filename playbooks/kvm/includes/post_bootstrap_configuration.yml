- name: Add SBCE to in-memory inventory
  ansible.builtin.add_host:
    hostname: "{{ node.hostname | default(node.vmname) }}"
    ansible_host: "{{ node.ip0 }}"
    ansible_user: ipcs
    ansible_password: "{{ node.ipcspass }}"
    ansible_become_user: root
    ansible_become_password: "{{ node.rootpass }}"
    ansible_become_method: su
    ansible_port: 22
    ansible_timeout: 30
    ansible_python_interpreter: /usr/libexec/platform-python
  no_log: false
  when: not post_bootstrap_skip_connection_setup | default(false) | bool

- name: "Wait for {{ node.hostname | default(node.vmname) }} SSH to become available"
  ansible.builtin.wait_for_connection:
    delay: 30
    timeout: 600
  delegate_to: "{{ node.hostname | default(node.vmname) }}"
  when: not post_bootstrap_skip_connection_setup | default(false) | bool

- name: "Pause another 60 secs"
  ansible.builtin.pause:
    seconds: 60

- name: "Update timezone"
  become: yes
  ansible.builtin.shell: "timedatectl set-timezone {{ node.timezone }}"
  when: node.timezone | default('', true) | length > 0
  delegate_to: "{{ node.hostname | default(node.vmname) }}"

- name: "Extract 1st NTP server"
  ansible.builtin.set_fact:
    ntpserver: "{{ (node.ntpservers | default('', true)).split(',') | first }}"
  when: node.ntpservers | default('', true) | length > 0
  delegate_to: "{{ node.hostname | default(node.vmname) }}"

- name: "Update NTP server"
  become: yes
  ansible.builtin.shell: "sbceconfigurator.py change-ntp-ip {{ ntpserver }}"
  when: ntpserver is defined and ntpserver | length > 0
  delegate_to: "{{ node.hostname | default(node.vmname) }}"

- name: "Disable password aging for 'ipcs' user"
  become: yes
  ansible.builtin.shell: "chage -E -1 -m 0 -M 99999 ipcs"
  delegate_to: "{{ node.hostname | default(node.vmname) }}"

- name: "Authorize Secure Boot certificate"
  when: node.apptype == "SBCE" or node.apptype == "EMS+SBCE"
  block:
    - name: "Import certificate"
      become: yes
      ansible.builtin.command:
        argv:
          - mokutil
          - --import
          - asbc_custom_secure_boot_cert.cer
      args:
        chdir: /usr/local/ipcs/etc/cert/signatures/
        stdin: |
          {{ node.rootpass }}
          {{ node.rootpass }}
      no_log: true
      delegate_to: "{{ node.hostname | default(node.vmname) }}"

    - name: "Reboot SBCE"
      ansible.builtin.command: /sbin/reboot
      become: yes
      delegate_to: "{{ node.hostname | default(node.vmname) }}"
      async: 1
      poll: 0
      failed_when: false

    - name: "Wait 8 secs for the blue MOK screen to show up"
      ansible.builtin.pause:
        seconds: 8

    - name: Send ENTER
      kvm_guest_sendkey:
        name: "{{ node.vmname }}"
        keys_send:
          - ENTER
        sleep_time: "{{ sleep_time }}"
      changed_when: false

    - name: Send DOWN key to select 'Enroll MOK'
      kvm_guest_sendkey:
        name: "{{ node.vmname }}"
        keys_send:
          - DOWN
        sleep_time: "{{ sleep_time }}"
      changed_when: false

    - name: Send ENTER
      kvm_guest_sendkey:
        name: "{{ node.vmname }}"
        keys_send:
          - ENTER
        sleep_time: "{{ sleep_time }}"
      changed_when: false

    - name: Send DOWN key to select 'Continue'
      kvm_guest_sendkey:
        name: "{{ node.vmname }}"
        keys_send:
          - DOWN
        sleep_time: "{{ sleep_time }}"
      changed_when: false

    - name: Send ENTER
      kvm_guest_sendkey:
        name: "{{ node.vmname }}"
        keys_send:
          - ENTER
        sleep_time: "{{ sleep_time }}"
      changed_when: false

    - name: Send DOWN key to select 'Yes'
      kvm_guest_sendkey:
        name: "{{ node.vmname }}"
        keys_send:
          - DOWN
        sleep_time: "{{ sleep_time }}"
      changed_when: false

    - name: Send ENTER
      kvm_guest_sendkey:
        name: "{{ node.vmname }}"
        keys_send:
          - ENTER
        sleep_time: "{{ sleep_time }}"
      changed_when: false

    - name: "Enter enrollment password"
      kvm_guest_sendkey:
        name: "{{ node.vmname }}"
        string_send: "{{ node.rootpass }}"
        no_enter: true

    - name: Send ENTER
      kvm_guest_sendkey:
        name: "{{ node.vmname }}"
        keys_send:
          - ENTER
        sleep_time: "{{ sleep_time }}"
      changed_when: false

    - name: Send ENTER
      kvm_guest_sendkey:
        name: "{{ node.vmname }}"
        keys_send:
          - ENTER
        sleep_time: "{{ sleep_time }}"
      changed_when: false

    - name: Wait for SBCE SSH after MOK enrollment reboot
      ansible.builtin.wait_for_connection:
        delay: 10
        timeout: 300
      delegate_to: "{{ node.hostname | default(node.vmname) }}"
