- name: "Please select a continent or ocean (11 = none): 11"
  kvm_guest_sendkey:
    name: "{{ node.vmname }}"
    string_send: "11"
    no_enter: true

- name: Confirm continent (default Yes)
  kvm_guest_sendkey:
    name: "{{ node.vmname }}"
    keys_send:
      - ENTER
    sleep_time: "{{ sleep_time }}"
  no_log: true
  changed_when: false

- name: "Please enter the desired value of the TZ environment variable: GMT-4"
  kvm_guest_sendkey:
    name: "{{ node.vmname }}"
    string_send: "GMT-4"
    no_enter: true

- name: Confirm timezone (default Yes)
  kvm_guest_sendkey:
    name: "{{ node.vmname }}"
    keys_send:
      - ENTER
    sleep_time: "{{ sleep_time }}"
  no_log: true
  changed_when: false

- name: "Is the above information OK? (1 Yes, 2 No): 1"
  kvm_guest_sendkey:
    name: "{{ node.vmname }}"
    string_send: "1"
    no_enter: true

- name: Send ENTER and wait 90 seconds
  kvm_guest_sendkey:
    name: "{{ node.vmname }}"
    keys_send:
      - ENTER
    sleep_time: 90
  no_log: true
  changed_when: false

- name: "New Password for 'root' user: {{ node.rootpass }}"
  kvm_guest_sendkey:
    name: "{{ node.vmname }}"
    string_send: "{{ node.rootpass }}"
    no_enter: true
  when: node.rootpass is defined and (node.rootpass | string | length) > 0
