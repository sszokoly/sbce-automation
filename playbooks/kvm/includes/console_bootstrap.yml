    name: "{{ node.vmname }}"
    string_send: "{{ node.emsip }}"
    no_enter: true
  when:
    - node.apptype == 'SBCE' or (node.apptype == 'EMS' and node.ems_inst_type == 'secondary')
    - node.emsip is defined and (node.emsip | string | length) > 0

- name: Send emsip ENTER
  kvm_guest_sendkey:
    name: "{{ node.vmname }}"
    keys_send:
