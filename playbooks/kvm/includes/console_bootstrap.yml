---
- name: "Console bootstrap notice"
  ansible.builtin.debug:
    msg: >-
      Running KVM console bootstrap for {{ node.hostname | default(node.vmname) }}.
      console_prompt_check={{ console_prompt_check }}; auto mode may fall back to fixed waits.

- name: "Enter your choice [1 - 4] : 1"
  kvm_guest_sendkey:
    name: "{{ node.vmname }}"
    string_send: "1"
    no_enter: true

- name: Send ENTER and wait 10 seconds
  kvm_guest_sendkey:
    name: "{{ node.vmname }}"
    keys_send:
      - ENTER
    sleep_time: 10
  no_log: true
  changed_when: false

- name: "IP Mode: {{ node.ipmode }}"
  kvm_guest_sendkey:
    name: "{{ node.vmname }}"
    string_send: "{{ node.ipmode }}"
    no_enter: true
  when:
    - node.ipmode is defined
    - node.ipmode is not none
    - node.ipmode | string | lower != "null"
    - node.ipmode | string | length > 0

- name: Send ipmode ENTER
  kvm_guest_sendkey:
    name: "{{ node.vmname }}"
    keys_send:
      - ENTER
    sleep_time: "{{ sleep_time }}"
  no_log: true
  changed_when: false

- name: "Appliance Type: {{ node.apptype }}"
  kvm_guest_sendkey:
    name: "{{ node.vmname }}"
    string_send: "{{ node.apptype }}"
    no_enter: true
  when: node.apptype is defined and (node.apptype | string | length) > 0

- name: Send apptype ENTER
  kvm_guest_sendkey:
    name: "{{ node.vmname }}"
    keys_send:
      - ENTER
    sleep_time: "{{ sleep_time }}"
  no_log: true
  changed_when: false

- name: "Network Passphrase: {{ node.nwpass }}"
  kvm_guest_sendkey:
    name: "{{ node.vmname }}"
    string_send: "{{ node.nwpass }}"
    no_enter: true
  when:
    - node.apptype in ['EMS', 'SBCE']
    - node.nwpass

- name: Send nwpass ENTER
  kvm_guest_sendkey:
    name: "{{ node.vmname }}"
    keys_send:
      - ENTER
    sleep_time: "{{ sleep_time }}"
  no_log: true
  changed_when: false

- name: Set appliance_name # this appname cannot be the same as here during SBCE install
  ansible.builtin.set_fact:
    appliance_name: >-
      {{ node.appname if node.apptype == 'EMS' else node.vmname }}
  when:
    - node.appname is defined and (node.appname | string | length) > 0
    - node.vmname is defined and (node.vmname | string | length) > 0

- name: "Appliance Name: {{ appliance_name }}"
  kvm_guest_sendkey:
    name: "{{ node.vmname }}"
    string_send: "{{ appliance_name }}"
    no_enter: true
  when: appliance_name is defined and (appliance_name | string | length) > 0

- name: Send appname ENTER
  kvm_guest_sendkey:
    name: "{{ node.vmname }}"
    keys_send:
      - ENTER
    sleep_time: "{{ sleep_time }}"
  no_log: true
  changed_when: false

- name: "Installation Type: {{ node.ems_inst_type }}"
  kvm_guest_sendkey:
    name: "{{ node.vmname }}"
    string_send: "{{ node.ems_inst_type }}"
    no_enter: true
  when:
    - node.apptype == 'EMS'
    - node.ems_inst_type

- name: Send ems_inst_type ENTER
  kvm_guest_sendkey:
    name: "{{ node.vmname }}"
    keys_send:
      - ENTER
    sleep_time: "{{ sleep_time }}"
  no_log: true
  changed_when: false
  when:
    - node.apptype == 'EMS'
    - node.ems_inst_type

