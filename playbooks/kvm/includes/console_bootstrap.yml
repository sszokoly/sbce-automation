    name: "{{ node.vmname }}"
    keys_send:
      - ENTER
    sleep_time: "{{ sleep_time }}"
  no_log: true
  changed_when: false
  when:
    - node.apptype == 'SBCE' or (node.apptype == 'EMS' and node.ems_inst_type == 'secondary')
    - node.emsip_v6 is defined and (node.emsip_v6 | string | length) > 0

- name: "NTP Server IP Address (ipv4): 127.127.1.0"
  kvm_guest_sendkey:
    name: "{{ node.vmname }}"
    keys_send:
      - ENTER

- name: "NTP Server IP Address (ipv6):"
  kvm_guest_sendkey:
    name: "{{ node.vmname }}"
    keys_send:
      - ENTER

- name: "List of DNS Servers: {{ node.dns }}"
