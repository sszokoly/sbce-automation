- name: "Initialize VM deploy retry state"
  ansible.builtin.set_fact:
    vm_deploy_verified: false
  tags:
    - always
    - step01
    - step01retry1

- name: "Deploy VM attempt 1"
  block:
    - name: "Run VM deploy attempt 1"
      ansible.builtin.include_tasks: 01_deploy_vm_attempt.yml

    - name: "Mark VM deploy attempt 1 verified"
      ansible.builtin.set_fact:
        vm_deploy_verified: true
  rescue:
    - name: "Clean up failed VM deploy attempt 1"
      ansible.builtin.shell: |
        virsh -c qemu:///system destroy "{{ args['vmname'] }}" || true
        virsh -c qemu:///system undefine "{{ args['vmname'] }}" --nvram || true
        rm -f "/var/lib/libvirt/images/{{ image_filename }}"
        rm -f "/tmp/{{ args['vmname'] }}.xml"
      become: true
      delegate_to: kvm_host
      when:
        - not vm_deploy_verified | bool
        - args is defined
        - image_filename is defined
        - "'kvm_host' in hostvars"
  when: not vm_deploy_verified | bool
  tags:
    - always
    - step01
    - step01retry2

- name: "Deploy VM attempt 2"
  block:
    - name: "Run VM deploy attempt 2"
      ansible.builtin.include_tasks: 01_deploy_vm_attempt.yml

    - name: "Mark VM deploy attempt 2 verified"
      ansible.builtin.set_fact:
        vm_deploy_verified: true
  rescue:
    - name: "Clean up failed VM deploy attempt 2"
      ansible.builtin.shell: |
        virsh -c qemu:///system destroy "{{ args['vmname'] }}" || true
        virsh -c qemu:///system undefine "{{ args['vmname'] }}" --nvram || true
        rm -f "/var/lib/libvirt/images/{{ image_filename }}"
        rm -f "/tmp/{{ args['vmname'] }}.xml"
      become: true
      delegate_to: kvm_host
      when:
        - not vm_deploy_verified | bool
        - args is defined
        - image_filename is defined
        - "'kvm_host' in hostvars"
  when: not vm_deploy_verified | bool
  tags:
    - always
    - step01
    - step01retry3

- name: "Deploy VM attempt 3"
  block:
    - name: "Run VM deploy attempt 3"
      ansible.builtin.include_tasks: 01_deploy_vm_attempt.yml

    - name: "Mark VM deploy attempt 3 verified"
      ansible.builtin.set_fact:
        vm_deploy_verified: true
  rescue:
    - name: "Clean up failed VM deploy attempt 3"
      ansible.builtin.shell: |
        virsh -c qemu:///system destroy "{{ args['vmname'] }}" || true
        virsh -c qemu:///system undefine "{{ args['vmname'] }}" --nvram || true
        rm -f "/var/lib/libvirt/images/{{ image_filename }}"
        rm -f "/tmp/{{ args['vmname'] }}.xml"
      become: true
      delegate_to: kvm_host
      when:
        - not vm_deploy_verified | bool
        - args is defined
        - image_filename is defined
        - "'kvm_host' in hostvars"

    - name: "Fail after 3 VM deploy attempts"
      ansible.builtin.fail:
        msg: "VM '{{ args['vmname'] }}' did not reach the expected bootstrap prompt after 3 deploy attempts."
  when: not vm_deploy_verified | bool
  tags:
    - always
    - step01
    - step01retry4
